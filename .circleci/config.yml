# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Orbs are reusable packages of CircleCI configuration that you may share across projects,
# enabling you to create encapsulated, parameterized commands, jobs, and executors.
orbs:
  python: circleci/python@2.1.1
  codecov: codecov/codecov@3.2.4

jobs:
  build-and-test:
    docker:
      - image: continuumio/miniconda3

    steps:
      - checkout

      # Install system-level dependencies required by Qt/PySide6 and WeasyPrint.
      # This is needed for headless GUI tests in a minimal CircleCI Docker image.
      - run:
          name: Install system dependencies for Qt/PySide6 and WeasyPrint
          command: |
            apt-get update
            apt-get install -y \
              xvfb \
              libx11-6 \
              libx11-xcb1 \
              libxcb1 \
              libxcb-cursor0 \
              libxcb-xinerama0 \
              libxcb-render0 \
              libxcb-shape0 \
              libxcb-shm0 \
              libxcb-randr0 \
              libxcb-xfixes0 \
              libxcb-keysyms1 \
              libxrandr2 \
              libxcomposite1 \
              libxdamage1 \
              libxi6 \
              libxtst6 \
              libxext6 \
              libxrender1 \
              libxau6 \
              libxdmcp6 \
              libice6 \
              libsm6 \
              libdbus-1-3 \
              libgl1 \
              libegl1 \
              libgles2 \
              libopengl0 \
              libfontconfig1 \
              libfreetype6 \
              libharfbuzz0b \
              libpango-1.0-0 \
              libpangocairo-1.0-0 \
              libcairo2 \
              libpangoft2-1.0-0 \
              shared-mime-info \
              libnss3 \
              libnspr4 \
              libxkbcommon0 \
              libxkbfile1 \
              libxkbcommon-x11-0 \
              libxcb-util1 \
              libxcb-xkb1 \
              libxss1 \
              libxcursor1 \
              libatomic1 \
              zlib1g \
              libpcre2-8-0 \
              libffi8 \
              libuuid1 \
              libglib2.0-0 \
              libgcrypt20 \
              libgpg-error0 \
              libdouble-conversion3 \
              libmd4c0 \
              libjpeg62-turbo \
              libevent-2.1-7 \
              libasound2 \
              libasound2-data \
              libdrm2 \
              libxshmfence1 \
              libgl1-mesa-dri \
              fonts-dejavu-core \
              fonts-dejavu-extra \
              ca-certificates

            # ICU version can vary between base images; try the most recent, then fall back.
            apt-get install -y libicu72 || \
            apt-get install -y libicu70 || \
            apt-get install -y libicu67 || true

      # Create conda environment, install ALMOS + test stack, run tests and generate coverage.
      - run:
          name: Run ALMOS core and GUI tests with combined coverage
          command: |
            # ------------------------------------------------------------------
            # Proper conda initialization for a non-interactive shell
            # ------------------------------------------------------------------
            eval "$(conda shell.bash hook)"

            # Updating conda can be slow, but avoids old solver issues in fresh images.
            conda update -y conda

            # Create and activate project-specific environment.
            # ALMOS currently requires Python >=3.11.
            conda create -n cheminf python=3.12 -y
            conda activate cheminf

            # ------------------------------------------------------------------
            # Install project dependencies
            # ------------------------------------------------------------------
            python -m pip install --upgrade pip

            # Core scientific and native dependencies from conda-forge:
            # - openbabel / xtb / libgfortran: chemistry-related tooling
            # - glib / gtk3 / pango / mscorefonts: required by WeasyPrint/PDF stack
            # - libxkbcommon: required by Qt for keyboard handling
            conda install -y -c conda-forge \
              openbabel=3.1.1 \
              xtb=6.7.1 \
              libgfortran=14.2.0 \
              glib \
              gtk3 \
              pango \
              libxkbcommon \
              mscorefonts \
              fonts-conda-forge

            # Ensure the dynamic linker can find native libraries installed inside the conda environment.
            # WeasyPrint loads GLib/Pango/Cairo through dlopen(), and without this path the loader may miss
            # libraries such as libgobject-2.0.so.0 that live in $CONDA_PREFIX/lib.
            export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:${LD_LIBRARY_PATH}"

            # Install ALMOS from the current repository.
            # This also installs dependencies declared in setup.py, including AQME and ROBERT.
            pip install .

            # ------------------------------------------------------------------
            # Test tooling
            # ------------------------------------------------------------------
            pip install pytest pytest-cov pytest-qt
            pip install "coverage>=7.10,<8"

            # IMPORTANT:
            # CircleCI executes 'run' steps with 'set -e' by default.
            # We temporarily disable it so we can inspect pytest/xvfb-run exit codes
            # and treat known Qt shutdown crashes as a special case.
            set +e

            # ------------------------------------------------------------------
            # Run core non-GUI tests first
            # ------------------------------------------------------------------
            python -m pytest \
              -v \
              --ignore=tests/test_easyalmos.py \
              --cov=almos \
              --cov-report=

            CORE_EXIT_CODE=$?

            if [ "$CORE_EXIT_CODE" -ne 0 ]; then
              echo "[CI] Core tests failed with exit code $CORE_EXIT_CODE"
              exit "$CORE_EXIT_CODE"
            fi

            # ------------------------------------------------------------------
            # Configure Qt/QtWebEngine for headless execution under Xvfb
            # ------------------------------------------------------------------
            export QT_QPA_PLATFORM=offscreen
            export QT_OPENGL=software
            export QT_RHI=software
            export QTWEBENGINE_DISABLE_SANDBOX=1
            export QTWEBENGINE_CHROMIUM_FLAGS="--no-sandbox --disable-gpu"

            # ------------------------------------------------------------------
            # Run GUI tests under Xvfb, capturing the exit code
            # ------------------------------------------------------------------
            xvfb-run -s "-screen 0 1920x1080x24" \
              python -m pytest \
                -vv \
                --cov=almos \
                --cov-append \
                --cov-report= \
                tests/test_easyalmos.py

            GUI_EXIT_CODE=$?

            # Re-enable 'exit on error' for any subsequent commands.
            set -e

            # PySide6/Qt sometimes causes a segmentation fault or abort on interpreter shutdown
            # after all tests have passed. In that case we treat the run as successful but emit a warning.
            if [ "$GUI_EXIT_CODE" -eq 139 ] || [ "$GUI_EXIT_CODE" -eq 134 ]; then
              echo "[CI WARNING] GUI tests completed, but Qt/PySide6 triggered a crash on interpreter shutdown."
              echo "[CI WARNING] Exit code: $GUI_EXIT_CODE"
              echo "[CI WARNING] This is usually caused by threads or Qt resources not being fully cleaned up."
              echo "[CI WARNING] Treating this exit code as success because all tests passed."
              GUI_EXIT_CODE=0
            fi

            # Any other non-zero exit code is treated as a real failure.
            if [ "$GUI_EXIT_CODE" -ne 0 ]; then
              echo "[CI] GUI tests failed with exit code $GUI_EXIT_CODE"
              exit "$GUI_EXIT_CODE"
            fi

            # Generate a single combined XML coverage report after both pytest runs.
            coverage xml

            # ------------------------------------------------------------------
            # Save coverage and workspace artifacts
            # ------------------------------------------------------------------
            rm -rf /tmp/*
            cp coverage.xml /tmp/
            cp -r almos /tmp/

      # Persist coverage report and source tree for the Codecov job.
      - persist_to_workspace:
          root: /tmp
          paths:
            - coverage.xml
            - almos

  # Same dependency stack and pytest suite as build-and-test, on Windows.
  # No workspace is persisted here because Codecov is uploaded only from the Linux job.
  build-and-test-windows:
    machine:
      image: windows-server-2022-gui:current
      resource_class: windows.medium
    shell: bash.exe

    steps:
      - checkout

      - run:
          name: Conda env, install dependencies and run pytest on Windows
          command: |
            set -euo pipefail

            # ------------------------------------------------------------------
            # Proper conda initialization for Git Bash on Windows
            # ------------------------------------------------------------------
            conda update -y conda
            eval "$(conda shell.bash hook)"

            # Create and activate project-specific environment.
            conda create -y -n cheminf python=3.12
            conda activate cheminf

            python -m pip install --upgrade pip

            # Chemistry and native dependencies.
            conda install -y -c conda-forge openbabel=3.1.1
            conda install -y -c conda-forge xtb=6.7.1
            conda install -y -c conda-forge libgfortran=14.2.0
            conda install -y -c conda-forge glib gtk3 pango

            # Install ALMOS from the current repository.
            pip install .

            # Test tooling.
            pip install pytest pytest-cov

            # Run the full test suite on Windows.
            python -m pytest -v --cov=almos --cov-report=xml --cov-report=term

  # The Codecov orb may not work reliably inside the Miniconda Docker image,
  # so the coverage report is stored in a workspace and uploaded from a standard Python image.
  codecov-coverage:
    docker:
      - image: cimg/python:3.12

    steps:
      # Attach artifacts from the previous job workspace.
      - attach_workspace:
          at: /tmp

      # Checkout is required so Codecov can correctly map coverage to the repository.
      - checkout

      # Upload the coverage report generated in the build-and-test job.
      - codecov/upload:
          file: /tmp/coverage.xml
          token: CODECOV_TOKEN

workflows:
  test-and-coverage:
    jobs:
      - build-and-test

      # Enable this job when Windows CI is needed.
      # It is kept commented because Windows runners are slower and may consume more credits.
      # - build-and-test-windows

      - codecov-coverage:
          requires:
            - build-and-test